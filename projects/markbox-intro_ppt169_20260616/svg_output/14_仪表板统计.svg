<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">视图</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="80" y="115" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#2D2A26">仪表板统计</text>
    <text x="80" y="148" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.40">Recharts 可视化 · 三层智能推荐 · 数据驱动的阅读洞察</text>
  </g>
  <g id="placeholder-stats">
    <rect x="80" y="180" width="1120" height="270" rx="12" fill="#c9866b" fill-opacity="0.03"/>
    <rect x="80" y="180" width="1120" height="270" rx="12" fill="none" stroke="#c9866b" stroke-opacity="0.30" stroke-width="1.5" stroke-dasharray="8,4"/>
    <use data-icon="tabler-outline/chart-bar" x="600" y="275" width="40" height="40" fill="#c9866b" fill-opacity="0.45" stroke-width="2"/>
    <text x="640" y="340" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#2D2A26" fill-opacity="0.33">detail_stats_chart.png</text>
    <text x="640" y="363" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">饼图 + 柱状图 + 词云特写</text>
  </g>
  <g id="features">
    <g id="feat-chart">
      <rect x="80" y="480" width="350" height="150" rx="10" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
      <use data-icon="tabler-outline/chart-pie" x="110" y="515" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="150" y="532" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#2D2A26">阅读状态饼图</text>
      <text x="110" y="565" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.40">待读/在读/已读/归档分布 · 内容类型柱状图 · CSS 词云标签频率</text>
    </g>
    <g id="feat-recommend">
      <rect x="455" y="480" width="370" height="150" rx="10" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
      <use data-icon="tabler-outline/sparkles" x="485" y="515" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="525" y="532" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#2D2A26">三层智能推荐</text>
      <text x="485" y="565" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.40">
        <tspan x="485" dy="0">继续深入 · 拓展边界 · 重温旧藏</tspan>
        <tspan x="485" dy="22">标签共现(毫秒级) + Embedding 语义精排</tspan>
      </text>
    </g>
    <g id="feat-track">
      <rect x="850" y="480" width="350" height="150" rx="10" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
      <use data-icon="tabler-outline/timeline" x="880" y="515" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="920" y="532" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#2D2A26">追踪迷你图</text>
      <text x="880" y="565" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.40">TrackingSparkline Canvas 迷你折线图 · GitHub Star 热度追踪</text>
    </g>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">14 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 仪表板统计</text>
  </g>
</svg>