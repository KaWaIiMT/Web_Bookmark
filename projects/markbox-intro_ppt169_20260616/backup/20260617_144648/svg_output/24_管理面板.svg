<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">安全</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#2D2A26">管理面板</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.40">多用户管理 · 书签审查 · 数据导出 — 为团队和实例管理员提供完整控制</text>
  </g>
  <g id="placeholder-admin">
    <rect x="80" y="190" width="1120" height="340" rx="12" fill="#c9866b" fill-opacity="0.03"/>
    <rect x="80" y="190" width="1120" height="340" rx="12" fill="none" stroke="#c9866b" stroke-opacity="0.30" stroke-width="1.5" stroke-dasharray="8,4"/>
    <use data-icon="tabler-outline/users" x="600" y="325" width="40" height="40" fill="#c9866b" fill-opacity="0.45" stroke-width="2"/>
    <text x="640" y="390" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#2D2A26" fill-opacity="0.33">full_admin.png</text>
    <text x="640" y="413" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">管理面板全貌截图</text>
  </g>
  <g id="admin-features">
    <g id="admin-1">
      <rect x="80" y="560" width="355" height="70" rx="8" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
      <use data-icon="tabler-outline/users" x="110" y="585" width="20" height="20" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="145" y="585" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#2D2A26">用户列表 · 角色分配</text>
      <text x="110" y="610" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.28">多用户管理 · 管理员/普通用户角色</text>
    </g>
    <g id="admin-2">
      <rect x="455" y="560" width="355" height="70" rx="8" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
      <use data-icon="tabler-outline/eye" x="485" y="585" width="20" height="20" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="520" y="585" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#2D2A26">查看任意用户书签</text>
      <text x="485" y="610" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.28">管理员视角浏览/审查书签数据</text>
    </g>
    <g id="admin-3">
      <rect x="830" y="560" width="370" height="70" rx="8" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
      <use data-icon="tabler-outline/download" x="860" y="585" width="20" height="20" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="895" y="585" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#2D2A26">统计卡片 · 数据导出 JSON</text>
      <text x="860" y="610" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.28">数据库统计总览 · 导出备份</text>
    </g>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">24 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 管理面板</text>
  </g>
</svg>