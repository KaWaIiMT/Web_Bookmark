<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">视图</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#2D2A26">知识图谱</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.40">力导向图 · 标签共现网络 · 三层交互 · 时间轴播放</text>
  </g>
  <g id="image-graph">
    <rect x="80" y="185" width="725" height="330" rx="12" fill="#F2F0ED"/>
    <image href="../images/screenshots/full_knowledge_graph.png" x="80" y="185" width="725" height="330" rx="12" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g id="callouts">
    <g id="callout-1">
      <rect x="835" y="185" width="365" height="100" rx="10" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
      <use data-icon="tabler-outline/search" x="860" y="210" width="20" height="20" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="895" y="225" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#2D2A26">搜索高亮 + 节点筛选</text>
      <text x="860" y="252" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.28">搜索节点高亮标记 · 下拉筛选仅显示邻居</text>
    </g>
    <g id="callout-2">
      <rect x="835" y="300" width="365" height="100" rx="10" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
      <use data-icon="tabler-outline/arrow-right" x="860" y="325" width="20" height="20" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="895" y="340" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#2D2A26">三层交互</text>
      <text x="860" y="367" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.28">L1 标签/分类总览 → L2 点击展开书签 → L3 详情抽屉</text>
    </g>
    <g id="callout-3">
      <rect x="835" y="415" width="365" height="100" rx="10" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
      <use data-icon="tabler-outline/star" x="860" y="440" width="20" height="20" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="895" y="455" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#2D2A26">视觉打磨</text>
      <text x="860" y="482" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.28">径向渐变光晕 · 暗色星空背景 · 节点大小按连接数</text>
    </g>
  </g>
  <g id="placeholder-node">
    <rect x="80" y="540" width="350" height="100" rx="10" fill="#c9866b" fill-opacity="0.03"/>
    <rect x="80" y="540" width="350" height="100" rx="10" fill="none" stroke="#c9866b" stroke-opacity="0.30" stroke-width="1.5" stroke-dasharray="8,4"/>
    <use data-icon="tabler-outline/eye" x="220" y="565" width="24" height="24" fill="#c9866b" fill-opacity="0.45" stroke-width="2"/>
    <text x="255" y="585" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.33">detail_graph_node.png</text>
    <text x="255" y="608" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.18">节点展开 · 书签子节点</text>
  </g>
  <g id="image-timeline">
    <rect x="455" y="540" width="350" height="100" rx="10" fill="#F2F0ED"/>
    <image href="../images/screenshots/detail_graph_timeline.png" x="455" y="540" width="350" height="100" rx="10" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <g id="note">
    <rect x="830" y="540" width="370" height="100" rx="8" fill="#c9866b" fill-opacity="0.04"/>
    <text x="855" y="568" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9866b" fill-opacity="0.45">技术亮点</text>
    <text x="855" y="595" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.28">防闪烁架构：全量节点预加载+visibility 控制</text>
    <text x="855" y="618" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.28">时间轴滑块+1x/2x/5x 播放速度+截图导出 PNG</text>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">16 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 知识图谱</text>
  </g>
</svg>