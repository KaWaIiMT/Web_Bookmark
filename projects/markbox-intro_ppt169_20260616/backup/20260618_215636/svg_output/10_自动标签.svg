<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">AI</text>
    <line x1="80" y1="68" x2="120" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#2D2A26">自动标签</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.40">AI 生成 2-5 个精准中文标签，彩色徽章展示</text>
  </g>
  <g id="left-content">
    <g id="feature-1">
      <use data-icon="tabler-outline/sparkles" x="80" y="210" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="228" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">智能标签生成</text>
      <text x="120" y="255" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">DeepSeek V4 Flash 分析书签内容，自动生成 2-5 个精准中文标签</text>
    </g>
    <g id="feature-2">
      <use data-icon="tabler-outline/puzzle" x="80" y="310" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="328" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">用户可编辑</text>
      <text x="120" y="355" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">标签非锁定，用户可手动增删改，标签属于用户私有</text>
    </g>
    <g id="feature-3">
      <use data-icon="tabler-outline/chart-pie" x="80" y="410" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="428" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">标签词云可视化</text>
      <text x="120" y="455" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">纯 CSS flex-wrap + 动态字号实现，Dashboard 标签分布一目了然</text>
    </g>
    <g id="feature-4">
      <use data-icon="tabler-outline/git-compare" x="80" y="510" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="528" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">标签共现推荐</text>
      <text x="120" y="555" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">Jaccard 标签相似度算法，免 AI 毫秒级关联推荐</text>
    </g>
  </g>
  <g id="image-tags">
    <rect x="640" y="190" width="560" height="440" rx="12" fill="#F2F0ED"/>
    <image href="../images/screenshots/detail_tags.png" x="640" y="190" width="560" height="440" rx="12" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">10 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 自动标签</text>
  </g>
</svg>