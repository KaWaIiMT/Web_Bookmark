<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">方案</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
  </g>
  <g id="hero-statement">
    <text x="640" y="170" text-anchor="middle" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="40" font-weight="700" fill="#2D2A26">MarkBox 的答案</text>
    <text x="640" y="240" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#2D2A26" fill-opacity="0.40">一个链接进来，AI 自动提取、理解、分类、关联</text>
    <text x="640" y="270" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#c9866b" fill-opacity="0.70">你只管收藏，剩下的交给 AI</text>
  </g>
  <g id="step-1">
    <rect x="140" y="340" width="280" height="260" rx="16" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="280" cy="400" r="32" fill="#c9866b" fill-opacity="0.08"/>
    <use data-icon="tabler-outline/link" x="259" y="379" width="42" height="42" fill="#c9866b" fill-opacity="0.60" stroke-width="2"/>
    <text x="280" y="465" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="600" fill="#2D2A26">粘贴链接</text>
    <text x="280" y="500" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">
      <tspan x="280" dy="0">复制 URL 一键丢入</tspan>
      <tspan x="280" dy="24">自动提取标题/封面/元数据</tspan>
    </text>
  </g>
  <g id="arrow-1">
    <line x1="430" y1="470" x2="480" y2="470" stroke="#c9866b" stroke-opacity="0.30" stroke-width="1.5"/>
    <polygon points="476,464 488,470 476,476" fill="#c9866b" fill-opacity="0.30"/>
  </g>
  <g id="step-2">
    <rect x="500" y="340" width="280" height="260" rx="16" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="640" cy="400" r="32" fill="#c9866b" fill-opacity="0.08"/>
    <use data-icon="tabler-outline/brain" x="619" y="379" width="42" height="42" fill="#c9866b" fill-opacity="0.60" stroke-width="2"/>
    <text x="640" y="465" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="600" fill="#2D2A26">AI 自动理解</text>
    <text x="640" y="500" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">
      <tspan x="640" dy="0">DeepSeek V4 Flash 驱动</tspan>
      <tspan x="640" dy="24">智能标签 + 分类 + 摘要</tspan>
    </text>
  </g>
  <g id="arrow-2">
    <line x1="790" y1="470" x2="840" y2="470" stroke="#c9866b" stroke-opacity="0.30" stroke-width="1.5"/>
    <polygon points="836,464 848,470 836,476" fill="#c9866b" fill-opacity="0.30"/>
  </g>
  <g id="step-3">
    <rect x="860" y="340" width="280" height="260" rx="16" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="1000" cy="400" r="32" fill="#c9866b" fill-opacity="0.08"/>
    <use data-icon="tabler-outline/graph" x="979" y="379" width="42" height="42" fill="#c9866b" fill-opacity="0.60" stroke-width="2"/>
    <text x="1000" y="465" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="600" fill="#2D2A26">知识网络生长</text>
    <text x="1000" y="500" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">
      <tspan x="1000" dy="0">十个视图多维度呈现</tspan>
      <tspan x="1000" dy="24">发现关联 · 对比分析 · 知识图谱</tspan>
    </text>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">03 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 解决方案</text>
  </g>
</svg>