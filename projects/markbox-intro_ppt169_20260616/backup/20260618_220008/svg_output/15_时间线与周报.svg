<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="60%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">视图</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#2D2A26">时间线 &amp; 周报</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.40">时间维度洞察 — 浏览书签收藏历史 &amp; 本周阅读变化</text>
  </g>
  <g id="col-timeline">
    <text x="80" y="205" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">时间线视图</text>
    <rect x="80" y="225" width="545" height="340" rx="12" fill="#F2F0ED"/>
    <image href="../images/screenshots/full_timeline.png" x="80" y="225" width="545" height="340" rx="12" preserveAspectRatio="xMidYMid slice"/>
    <text x="80" y="600" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.35">按月分组垂直时间线 · motion 交错入场动画 · RESTful 后端数据按月统计</text>
  </g>
  <g id="col-weekly">
    <text x="655" y="205" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">周报</text>
    <rect x="655" y="225" width="545" height="340" rx="12" fill="#F2F0ED"/>
    <image href="../images/screenshots/detail_weekly.png" x="655" y="225" width="545" height="340" rx="12" preserveAspectRatio="xMidYMid slice"/>
    <text x="655" y="600" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.35">本周 vs 上周对比 · 状态分布 · Top 标签 · 增长趋势 · 每周自动汇总</text>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">15 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 时间线 &amp; 周报</text>
  </g>
</svg>