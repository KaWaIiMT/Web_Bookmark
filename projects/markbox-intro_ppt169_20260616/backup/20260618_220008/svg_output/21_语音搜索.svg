<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">生态</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#2D2A26">语音搜索</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.40">Web Speech API 中文识别 — 说话就能搜到书签</text>
  </g>
  <g id="left-content">
    <g id="voice-speech">
      <use data-icon="tabler-outline/microphone" x="80" y="210" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="228" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">浏览器原生语音识别</text>
      <text x="120" y="255" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">Web Speech API 无需额外权限，Chrome 原生支持中文识别</text>
    </g>
    <g id="voice-realtime">
      <use data-icon="tabler-outline/wand" x="80" y="315" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="333" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">实时识别展示</text>
      <text x="120" y="360" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">边说边显示识别文字 · 语音结束后自动填入搜索框触发搜索</text>
    </g>
    <g id="voice-pulse">
      <use data-icon="tabler-outline/chart-pie" x="80" y="420" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="438" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">脉冲指示器动画</text>
      <text x="120" y="465" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">CSS 动画驱动的脉冲波纹，语音识别进行中时可见麦克风状态</text>
    </g>
    <g id="voice-ux">
      <use data-icon="tabler-outline/search" x="80" y="525" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="543" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">自然语言搜索结合</text>
      <text x="120" y="570" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">"上次那个讲 React hooks 的视频" → 语义搜索召回相关书签</text>
    </g>
  </g>
  <g id="visual-voice">
    <rect x="640" y="190" width="560" height="450" rx="12" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.06" stroke-width="1"/>
    <!-- Search bar at top -->
    <rect x="710" y="215" width="420" height="42" rx="21" fill="#F2F0ED"/>
    <use data-icon="tabler-outline/search" x="730" y="226" width="18" height="18" fill="#2D2A26" fill-opacity="0.25" stroke-width="2"/>
    <text x="758" y="240" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.28">上次那个讲 React hooks 的视频</text>
    <!-- Mic button -->
    <circle cx="1150" cy="236" r="22" fill="#c9866b" fill-opacity="0.10" stroke="#c9866b" stroke-opacity="0.30" stroke-width="2"/>
    <use data-icon="tabler-outline/microphone" x="1138" y="224" width="24" height="24" fill="#c9866b" fill-opacity="0.65" stroke-width="2.5"/>
    <!-- Pulse rings (CSS-inspired static representation) -->
    <circle cx="920" cy="340" r="80" fill="none" stroke="#c9866b" stroke-opacity="0.04" stroke-width="1.5"/>
    <circle cx="920" cy="340" r="56" fill="none" stroke="#c9866b" stroke-opacity="0.08" stroke-width="1.5"/>
    <circle cx="920" cy="340" r="36" fill="none" stroke="#c9866b" stroke-opacity="0.14" stroke-width="2"/>
    <!-- Central mic -->
    <circle cx="920" cy="340" r="26" fill="#c9866b" fill-opacity="0.12" stroke="#c9866b" stroke-opacity="0.35" stroke-width="2.5"/>
    <use data-icon="tabler-outline/microphone" x="906" y="326" width="28" height="28" fill="#c9866b" fill-opacity="0.60" stroke-width="2.5"/>
    <!-- Speech waveform bars -->
    <g transform="translate(820, 420)">
      <rect x="0" y="0" width="6" height="12" rx="3" fill="#c9866b" fill-opacity="0.25"/>
      <rect x="12" y="-6" width="6" height="24" rx="3" fill="#c9866b" fill-opacity="0.35"/>
      <rect x="24" y="-14" width="6" height="40" rx="3" fill="#c9866b" fill-opacity="0.50"/>
      <rect x="36" y="-20" width="6" height="52" rx="3" fill="#c9866b" fill-opacity="0.60"/>
      <rect x="48" y="-22" width="6" height="56" rx="3" fill="#c9866b" fill-opacity="0.55"/>
      <rect x="60" y="-18" width="6" height="48" rx="3" fill="#c9866b" fill-opacity="0.45"/>
      <rect x="72" y="-10" width="6" height="32" rx="3" fill="#c9866b" fill-opacity="0.30"/>
      <rect x="84" y="-12" width="6" height="36" rx="3" fill="#c9866b" fill-opacity="0.40"/>
      <rect x="96" y="-16" width="6" height="44" rx="3" fill="#c9866b" fill-opacity="0.50"/>
      <rect x="108" y="-24" width="6" height="60" rx="3" fill="#c9866b" fill-opacity="0.65"/>
      <rect x="120" y="-18" width="6" height="48" rx="3" fill="#c9866b" fill-opacity="0.50"/>
      <rect x="132" y="-10" width="6" height="32" rx="3" fill="#c9866b" fill-opacity="0.35"/>
      <rect x="144" y="-4" width="6" height="20" rx="3" fill="#c9866b" fill-opacity="0.25"/>
      <rect x="156" y="0" width="6" height="12" rx="3" fill="#c9866b" fill-opacity="0.18"/>
    </g>
    <!-- Bottom hint -->
    <rect x="710" y="528" width="420" height="75" rx="8" fill="#c9866b" fill-opacity="0.03"/>
    <use data-icon="tabler-outline/check" x="730" y="553" width="14" height="14" fill="#10B981" fill-opacity="0.40" stroke-width="2"/>
    <text x="752" y="557" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.28">Web Speech API · Chrome 原生支持中文</text>
    <use data-icon="tabler-outline/wand" x="730" y="576" width="14" height="14" fill="#c9866b" fill-opacity="0.30" stroke-width="2"/>
    <text x="752" y="580" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.28">识别完成后自动填入搜索框 · 支持语义搜索</text>
    <use data-icon="tabler-outline/chart-pie" x="730" y="599" width="14" height="14" fill="#c9866b" fill-opacity="0.30" stroke-width="2"/>
    <text x="752" y="603" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.28">CSS 脉冲动画指示器 · 边说边显示识别文字</text>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">21 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 语音搜索</text>
  </g>
</svg>