<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">AI</text>
    <line x1="80" y1="68" x2="120" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#2D2A26">智能分类</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.40">AI 自动建议层级路径，用户可确认或修改</text>
  </g>
  <g id="left-content">
    <g id="feature-1">
      <use data-icon="tabler-outline/brain" x="80" y="210" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="228" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">AI 路径建议</text>
      <text x="120" y="255" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">基于内容语义自动推断分类，如：技术学习 &gt; 前端 &gt; React</text>
    </g>
    <g id="feature-2">
      <use data-icon="tabler-outline/folder" x="80" y="320" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="338" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">层级分类树</text>
      <text x="120" y="365" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">自引用父子关系，支持无限嵌套的子分类结构</text>
    </g>
    <g id="feature-3">
      <use data-icon="tabler-outline/settings" x="80" y="430" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="448" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">分类管理</text>
      <text x="120" y="475" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">右键菜单重命名/删除分类，dnd-kit 可拖拽重排分类顺序</text>
    </g>
    <g id="feature-4">
      <use data-icon="tabler-outline/search" x="80" y="540" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="558" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">筛选过滤</text>
      <text x="120" y="585" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">侧边栏点击分类即可过滤，快速找到目标书签</text>
    </g>
  </g>
  <g id="visual-classification">
    <rect x="640" y="190" width="560" height="440" rx="12" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.06" stroke-width="1"/>
    <!-- AI badge -->
    <rect x="820" y="205" width="200" height="32" rx="16" fill="#c9866b" fill-opacity="0.08"/>
    <use data-icon="tabler-outline/sparkles" x="840" y="211" width="16" height="16" fill="#c9866b" stroke-width="2"/>
    <text x="862" y="225" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#c9866b">AI 自动路径推断</text>
    <!-- Tree: Level 1 - Root -->
    <rect x="740" y="270" width="180" height="38" rx="8" fill="#F2F0ED"/>
    <use data-icon="tabler-outline/folder" x="755" y="279" width="18" height="18" fill="#c9866b" stroke-width="2"/>
    <text x="780" y="293" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#2D2A26">技术学习</text>
    <!-- connector line -->
    <line x1="830" y1="308" x2="830" y2="330" stroke="#2D2A26" stroke-opacity="0.15" stroke-width="1.5"/>
    <!-- Tree: Level 2 branches -->
    <rect x="660" y="335" width="160" height="36" rx="8" fill="#F2F0ED"/>
    <use data-icon="tabler-outline/folder" x="673" y="344" width="16" height="16" fill="#b76e4b" stroke-width="2"/>
    <text x="740" y="357" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#2D2A26">前端</text>
    <rect x="840" y="335" width="160" height="36" rx="8" fill="#F2F0ED"/>
    <use data-icon="tabler-outline/folder" x="853" y="344" width="16" height="16" fill="#b76e4b" stroke-width="2"/>
    <text x="920" y="357" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#2D2A26">后端</text>
    <!-- connectors -->
    <line x1="740" y1="330" x2="740" y2="335" stroke="#2D2A26" stroke-opacity="0.15" stroke-width="1.5"/>
    <line x1="920" y1="330" x2="920" y2="335" stroke="#2D2A26" stroke-opacity="0.15" stroke-width="1.5"/>
    <line x1="740" y1="320" x2="830" y2="330" stroke="#2D2A26" stroke-opacity="0.15" stroke-width="1.5"/>
    <line x1="830" y1="330" x2="920" y2="320" stroke="#2D2A26" stroke-opacity="0.15" stroke-width="1.5"/>
    <!-- Level 3 -->
    <line x1="740" y1="371" x2="740" y2="395" stroke="#2D2A26" stroke-opacity="0.15" stroke-width="1.5"/>
    <rect x="660" y="400" width="160" height="34" rx="8" fill="#c9866b" fill-opacity="0.06" stroke="#c9866b" stroke-opacity="0.20" stroke-width="1" stroke-dasharray="4,3"/>
    <use data-icon="tabler-outline/folder" x="673" y="409" width="15" height="15" fill="#c9866b" stroke-width="2"/>
    <text x="740" y="421" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#c9866b">React</text>
    <text x="740" y="450" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.22">← AI 建议路径</text>
    <!-- Right side icons for features -->
    <rect x="840" y="420" width="340" height="80" rx="8" fill="#c9866b" fill-opacity="0.03"/>
    <text x="860" y="445" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.35">用户可确认 / 修改 / 新建分类</text>
    <text x="860" y="468" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.35">支持无限嵌套子分类 · dnd-kit 拖拽排序</text>
    <text x="860" y="491" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.35">侧边栏点击过滤 · 右键菜单管理</text>
    <!-- decorative dots -->
    <circle cx="1010" y="555" r="3" fill="#c9866b" fill-opacity="0.20"/>
    <circle cx="1025" y="565" r="4" fill="#d4a574" fill-opacity="0.15"/>
    <circle cx="1038" y="560" r="2" fill="#c9866b" fill-opacity="0.22"/>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">11 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 智能分类</text>
  </g>
</svg>