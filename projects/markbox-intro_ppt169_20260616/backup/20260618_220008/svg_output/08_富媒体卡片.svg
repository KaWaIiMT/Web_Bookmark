<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="60%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">基座</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#2D2A26">富媒体卡片</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.40">四种内容类型，四种差异化卡片展示</text>
  </g>
  <g id="type-video">
    <rect x="80" y="200" width="260" height="180" rx="10" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
    <use data-icon="tabler-outline/headphones" x="195" y="250" width="30" height="30" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
    <text x="210" y="295" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">视频</text>
    <text x="210" y="325" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.40">横向大卡片 · 封面左侧</text>
    <text x="210" y="348" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.30">UP主 · 播放量 · 时长</text>
  </g>
  <g id="type-article">
    <rect x="360" y="200" width="260" height="180" rx="10" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
    <use data-icon="tabler-outline/file" x="475" y="250" width="30" height="30" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
    <text x="490" y="295" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">文章</text>
    <text x="490" y="325" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.40">纵向卡片 · 头图顶部</text>
    <text x="490" y="348" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.30">作者 · 日期 · 阅读时长</text>
  </g>
  <g id="type-repo">
    <rect x="640" y="200" width="260" height="180" rx="10" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
    <use data-icon="tabler-outline/git-fork" x="755" y="250" width="30" height="30" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
    <text x="770" y="295" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">代码仓库</text>
    <text x="770" y="325" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.40">紧凑卡片 · 语言色条</text>
    <text x="770" y="348" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.30">Star · Fork · License</text>
  </g>
  <g id="type-webpage">
    <rect x="920" y="200" width="280" height="180" rx="10" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
    <use data-icon="tabler-outline/globe" x="1045" y="250" width="30" height="30" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
    <text x="1060" y="295" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">网页</text>
    <text x="1060" y="325" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.40">简约卡片 · Favicon</text>
    <text x="1060" y="348" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.30">标题 · 域名 · 描述片段</text>
  </g>
  <g id="image-grid">
    <rect x="80" y="415" width="545" height="220" rx="10" fill="#F2F0ED"/>
    <image href="../images/screenshots/full_grid.png" x="80" y="415" width="545" height="220" rx="10" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g id="image-cards">
    <rect x="655" y="415" width="545" height="220" rx="10" fill="#F2F0ED"/>
    <image href="../images/screenshots/full_gallery.png" x="655" y="415" width="545" height="220" rx="10" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">08 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 富媒体卡片</text>
  </g>
</svg>