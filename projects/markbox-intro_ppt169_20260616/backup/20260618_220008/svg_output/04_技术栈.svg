<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">基座</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="80" y="125" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#2D2A26">技术栈</text>
    <text x="80" y="158" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#2D2A26" fill-opacity="0.40">全栈 TypeScript · 现代 Web 架构</text>
  </g>
  <g id="card-framework">
    <rect x="80" y="205" width="520" height="135" rx="12" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
    <use data-icon="tabler-outline/terminal" x="115" y="242" width="32" height="32" fill="#c9866b" fill-opacity="0.55" stroke-width="2"/>
    <text x="165" y="265" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="600" fill="#2D2A26">全栈框架</text>
    <text x="115" y="305" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.45">Next.js 16 (Turbopack) + React 19.2 · TypeScript 严格模式 · 36 个 API 端点</text>
  </g>
  <g id="card-data">
    <rect x="630" y="205" width="570" height="135" rx="12" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
    <use data-icon="tabler-outline/database" x="665" y="242" width="32" height="32" fill="#c9866b" fill-opacity="0.55" stroke-width="2"/>
    <text x="715" y="265" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="600" fill="#2D2A26">数据层</text>
    <text x="665" y="305" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.45">Prisma 7.8 + SQLite (libsql) · 标签共现推荐 · Embedding 向量语义精排</text>
  </g>
  <g id="card-ai">
    <rect x="80" y="360" width="520" height="135" rx="12" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
    <use data-icon="tabler-outline/sparkles" x="115" y="397" width="32" height="32" fill="#c9866b" fill-opacity="0.55" stroke-width="2"/>
    <text x="165" y="420" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="600" fill="#2D2A26">AI 引擎</text>
    <text x="115" y="460" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.45">DeepSeek V4 Flash · 自动标签/分类/摘要 · Embedding 语义搜索 · AI 路径分析</text>
  </g>
  <g id="card-ui">
    <rect x="630" y="360" width="570" height="135" rx="12" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
    <use data-icon="tabler-outline/layout-dashboard" x="665" y="397" width="32" height="32" fill="#c9866b" fill-opacity="0.55" stroke-width="2"/>
    <text x="715" y="420" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="600" fill="#2D2A26">UI &amp; 动画</text>
    <text x="665" y="460" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.45">Tailwind CSS 4 + shadcn/ui · motion (Framer Motion) · Recharts · dnd-kit · 28 个组件</text>
  </g>
  <g id="badges">
    <rect x="80" y="535" width="140" height="36" rx="18" fill="#c9866b" fill-opacity="0.06"/>
    <text x="150" y="558" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9866b" fill-opacity="0.55">TypeScript</text>
    <rect x="235" y="535" width="120" height="36" rx="18" fill="#c9866b" fill-opacity="0.06"/>
    <text x="295" y="558" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9866b" fill-opacity="0.55">next-auth v5</text>
    <rect x="370" y="535" width="100" height="36" rx="18" fill="#c9866b" fill-opacity="0.06"/>
    <text x="420" y="558" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9866b" fill-opacity="0.55">dnd-kit</text>
    <rect x="485" y="535" width="100" height="36" rx="18" fill="#c9866b" fill-opacity="0.06"/>
    <text x="535" y="558" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9866b" fill-opacity="0.55">Recharts</text>
    <rect x="600" y="535" width="100" height="36" rx="18" fill="#c9866b" fill-opacity="0.06"/>
    <text x="650" y="558" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9866b" fill-opacity="0.55">cheerio</text>
    <rect x="715" y="535" width="80" height="36" rx="18" fill="#c9866b" fill-opacity="0.06"/>
    <text x="755" y="558" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9866b" fill-opacity="0.55">motion</text>
    <rect x="810" y="535" width="110" height="36" rx="18" fill="#c9866b" fill-opacity="0.06"/>
    <text x="865" y="558" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9866b" fill-opacity="0.55">lucide-react</text>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">04 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 技术栈</text>
  </g>
</svg>