<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">视图</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#2D2A26">发现页 &amp; 关联推荐</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.40">三模式发现 + 三层推荐体系 — 让好书签自己找到你</text>
  </g>
  <g id="left-content">
    <g id="mode-discover">
      <use data-icon="tabler-outline/globe" x="80" y="200" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="218" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">三模式发现页</text>
      <text x="120" y="245" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">跨领域探索 · 最新收录 · 每日精选 — 三种维度切换</text>
    </g>
    <g id="layer-tag">
      <use data-icon="tabler-outline/tag" x="80" y="305" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="323" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">第一层：标签共现</text>
      <text x="120" y="350" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">Jaccard 相似度算法 · 免 AI · 毫秒级延迟 · 同分类降级</text>
    </g>
    <g id="layer-embed">
      <use data-icon="tabler-outline/database" x="80" y="410" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="428" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">第二层：语义向量精排</text>
      <text x="120" y="455" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">DeepSeek Embedding API · 余弦相似度 · 标签40%+语义60%混合评分</text>
    </g>
    <g id="layer-dashboard">
      <use data-icon="tabler-outline/layout-dashboard" x="80" y="515" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="533" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">第三层：Dashboard 个性化</text>
      <text x="120" y="560" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">继续深入 · 拓展边界 · 重温旧藏 — 三维度智能推荐卡片</text>
    </g>
  </g>
  <g id="visual-recommend">
    <rect x="640" y="190" width="560" height="450" rx="12" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.06" stroke-width="1"/>
    <!-- Layer 3 (outermost - broad) -->
    <rect x="680" y="210" width="480" height="100" rx="10" fill="#d4a574" fill-opacity="0.04" stroke="#d4a574" stroke-opacity="0.12" stroke-width="1"/>
    <text x="705" y="238" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="600" fill="#d4a574">LAYER 3 · Dashboard 个性化</text>
    <text x="705" y="260" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26">继续深入 · 拓展边界 · 重温旧藏</text>
    <text x="705" y="285" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.28">三维度卡片推荐 · 每周自动刷新</text>
    <use data-icon="tabler-outline/layout-dashboard" x="1110" y="250" width="22" height="22" fill="#d4a574" fill-opacity="0.25" stroke-width="2"/>
    <!-- Arrow -->
    <line x1="920" y1="310" x2="920" y2="330" stroke="#2D2A26" stroke-opacity="0.12" stroke-width="1.5"/>
    <polygon points="916,326 920,333 924,326" fill="#2D2A26" fill-opacity="0.12"/>
    <!-- Layer 2 -->
    <rect x="690" y="335" width="460" height="90" rx="10" fill="#c9866b" fill-opacity="0.05" stroke="#c9866b" stroke-opacity="0.18" stroke-width="1.5"/>
    <text x="715" y="362" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="600" fill="#c9866b">LAYER 2 · 语义向量精排</text>
    <text x="715" y="384" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26">DeepSeek Embedding · 余弦相似度</text>
    <text x="715" y="407" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.28">标签 40% + 语义 60% 混合评分</text>
    <use data-icon="tabler-outline/database" x="1115" y="357" width="20" height="20" fill="#c9866b" fill-opacity="0.30" stroke-width="2"/>
    <!-- Arrow -->
    <line x1="920" y1="425" x2="920" y2="445" stroke="#2D2A26" stroke-opacity="0.12" stroke-width="1.5"/>
    <polygon points="916,441 920,448 924,441" fill="#2D2A26" fill-opacity="0.12"/>
    <!-- Layer 1 (innermost - precise) -->
    <rect x="710" y="450" width="420" height="80" rx="10" fill="#b76e4b" fill-opacity="0.06" stroke="#b76e4b" stroke-opacity="0.22" stroke-width="2"/>
    <text x="735" y="478" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="600" fill="#b76e4b">LAYER 1 · 标签共现匹配 (核心)</text>
    <text x="735" y="500" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26">Jaccard 相似度 · 免 AI · 毫秒级 · 同分类降级</text>
    <use data-icon="tabler-outline/tag" x="1085" y="466" width="22" height="22" fill="#b76e4b" fill-opacity="0.35" stroke-width="2.5"/>
    <!-- Bottom callout -->
    <rect x="690" y="555" width="480" height="55" rx="8" fill="#c9866b" fill-opacity="0.03"/>
    <text x="710" y="578" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.28">三模式发现页：跨领域探索 · 最新收录 · 每日精选</text>
    <text x="710" y="598" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.28">冷启动降级策略：免 AI 共现 → AI 精排 → 热度兜底</text>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">19 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 发现页 &amp; 推荐</text>
  </g>
</svg>