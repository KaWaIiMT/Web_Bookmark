      <polygon points="0,-90 86,-28 53,73 -53,73 -86,-28" fill="none" stroke="#2D2A26" stroke-opacity="0.06" stroke-width="1"/>
      <polygon points="0,-60 57,-19 35,49 -35,49 -57,-19" fill="none" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="1"/>
      <polygon points="0,-30 29,-9 18,24 -18,24 -29,-9" fill="none" stroke="#2D2A26" stroke-opacity="0.10" stroke-width="1"/>
      <!-- Axis lines -->
