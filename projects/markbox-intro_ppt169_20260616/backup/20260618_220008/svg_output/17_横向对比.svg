      <line x1="0" y1="0" x2="114" y2="-37" stroke="#2D2A26" stroke-opacity="0.10" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="70" y2="97" stroke="#2D2A26" stroke-opacity="0.10" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="-70" y2="97" stroke="#2D2A26" stroke-opacity="0.10" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="-114" y2="-37" stroke="#2D2A26" stroke-opacity="0.10" stroke-width="0.8"/>
      <!-- A values polygon -->
