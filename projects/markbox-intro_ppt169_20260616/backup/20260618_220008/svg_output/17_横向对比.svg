      <!-- B values polygon -->
      <polygon points="0,-85 105,-34 65,88 -40,65 -80,-28" fill="#d4a574" fill-opacity="0.08" stroke="#d4a574" stroke-opacity="0.30" stroke-width="1.5"/>
