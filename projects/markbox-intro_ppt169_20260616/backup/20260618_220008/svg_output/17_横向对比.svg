    <text x="285" y="248" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="600" fill="#2D2A26">书签 A</text>
    <text x="425" y="248" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="600" fill="#2D2A26">书签 B</text>
    <!-- Row 1: Depth -->
    <text x="115" y="295" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26">内容深度</text>
    <rect x="240" y="283" width="90" height="14" rx="7" fill="#c9866b" fill-opacity="0.15"/>
    <text x="285" y="294" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#c9866b">高 · 85%</text>
    <rect x="380" y="283" width="90" height="14" rx="7" fill="#d4a574" fill-opacity="0.12"/>
    <text x="425" y="294" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.45">中 · 62%</text>
    <!-- Row 2: Practical -->
    <text x="115" y="332" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26">实用性</text>
    <rect x="240" y="320" width="90" height="14" rx="7" fill="#c9866b" fill-opacity="0.15"/>
    <text x="285" y="331" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#c9866b">高 · 90%</text>
    <rect x="380" y="320" width="90" height="14" rx="7" fill="#c9866b" fill-opacity="0.15"/>
    <text x="425" y="331" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#c9866b">高 · 88%</text>
    <!-- Row 3: Freshness -->
    <text x="115" y="369" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26">时效性</text>
    <rect x="240" y="357" width="90" height="14" rx="7" fill="#F59E0B" fill-opacity="0.12"/>
    <text x="285" y="368" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.45">中 · 55%</text>
    <rect x="380" y="357" width="90" height="14" rx="7" fill="#c9866b" fill-opacity="0.15"/>
    <text x="425" y="368" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#c9866b">高 · 92%</text>
    <!-- Row 4: Readability -->
    <text x="115" y="406" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26">可读性</text>
    <rect x="240" y="394" width="90" height="14" rx="7" fill="#10B981" fill-opacity="0.12"/>
    <text x="285" y="405" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#10B981">优 · 95%</text>
    <rect x="380" y="394" width="90" height="14" rx="7" fill="#10B981" fill-opacity="0.12"/>
    <text x="425" y="405" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#10B981">优 · 91%</text>
    <!-- Row 5: Uniqueness -->
    <text x="115" y="443" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26">独特性</text>
    <rect x="240" y="431" width="90" height="14" rx="7" fill="#d4a574" fill-opacity="0.12"/>
    <text x="285" y="442" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.45">中 · 70%</text>
    <rect x="380" y="431" width="90" height="14" rx="7" fill="#10B981" fill-opacity="0.12"/>
    <text x="425" y="442" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#10B981">优 · 97%</text>
