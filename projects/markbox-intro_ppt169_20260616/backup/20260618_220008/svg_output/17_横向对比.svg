      <text x="130" y="-40" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.35">实用</text>
      <text x="82" y="110" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.35">时效</text>
      <text x="-82" y="110" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.35">可读</text>
      <text x="-130" y="-40" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.35">独特</text>
      <!-- Legend -->
      <circle cx="-40" cy="130" r="4" fill="#c9866b" fill-opacity="0.40"/>
      <text x="-30" y="134" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.35">书签 A</text>
      <circle cx="30" cy="130" r="4" fill="#d4a574" fill-opacity="0.30"/>
      <text x="40" y="134" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.35">书签 B</text>
    </g>
