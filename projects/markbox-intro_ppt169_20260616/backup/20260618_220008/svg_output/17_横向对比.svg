      <text x="390" y="613" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.40">AI 五维度深度评分</text>
      <text x="390" y="635" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.28">DeepSeek V4 Flash 多维度分析</text>
    </g>
    <g id="feat-3">
      <rect x="660" y="590" width="270" height="60" rx="8" fill="#c9866b" fill-opacity="0.04"/>
      <text x="680" y="613" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.40">矩阵表差异高亮 + Markdown 导出</text>
      <text x="680" y="635" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.28">红/黄差异标记 · 评语总结</text>
    </g>
    <g id="feat-4">
