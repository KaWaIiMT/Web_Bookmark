<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FAFAF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#FAFAF8"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.28">视图</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#2D2A26">学习路径</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#2D2A26" fill-opacity="0.40">结构化学习计划 · 书签编排 · 进度追踪 · AI 分析</text>
  </g>
  <g id="left-content">
    <g id="cap-create">
      <use data-icon="tabler-outline/plus" x="80" y="210" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="228" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">创建 &amp; 编排</text>
      <text x="120" y="255" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">Quick-create 学习路径 · Reorder 拖拽编排书签顺序 · 难度/阶段标注</text>
    </g>
    <g id="cap-track">
      <use data-icon="tabler-outline/chart-bar" x="80" y="310" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="328" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">进度追踪</text>
      <text x="120" y="355" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">完成勾选 · 进度条 · 总览仪表板 · 学习状态可视化</text>
    </g>
    <g id="cap-notes">
      <use data-icon="tabler-outline/file" x="80" y="410" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="428" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">微型笔记链</text>
      <text x="120" y="455" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">PathNote — 每个路径节点可添加收获/疑问/行动计划笔记</text>
    </g>
    <g id="cap-ai">
      <use data-icon="tabler-outline/brain" x="80" y="510" width="24" height="24" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
      <text x="120" y="528" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#2D2A26">AI 路径分析</text>
      <text x="120" y="555" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#2D2A26" fill-opacity="0.40">骨架生成 + 知识缺口检测 + Markdown 导出 · 10 个 API 端点</text>
    </g>
  </g>
  <g id="visual-path">
    <rect x="640" y="190" width="560" height="450" rx="12" fill="#FFFFFF" stroke="#2D2A26" stroke-opacity="0.06" stroke-width="1"/>
    <!-- Path header -->
    <text x="920" y="225" text-anchor="middle" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="20" font-weight="600" fill="#2D2A26">React 进阶路径</text>
    <text x="920" y="248" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.32">6 个阶段 · 12 篇书签 · 中高级</text>
    <!-- Progress bar -->
    <rect x="690" y="272" width="460" height="6" rx="3" fill="#F2F0ED"/>
    <rect x="690" y="272" width="230" height="6" rx="3" fill="#c9866b" fill-opacity="0.45"/>
    <text x="920" y="296" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#c9866b">50% 完成</text>
    <!-- Step nodes + connections -->
    <g>
      <!-- Node 1: complete -->
      <circle cx="750" cy="370" r="16" fill="#c9866b" fill-opacity="0.12" stroke="#c9866b" stroke-opacity="0.30" stroke-width="1.5"/>
      <use data-icon="tabler-outline/check" x="742" y="362" width="16" height="16" fill="#10B981" stroke-width="2.5"/>
      <text x="750" y="406" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="600" fill="#2D2A26">JSX 基础</text>
      <line x1="766" y1="370" x2="810" y2="370" stroke="#c9866b" stroke-opacity="0.20" stroke-width="2"/>
      <!-- Node 2: complete -->
      <circle cx="834" cy="370" r="16" fill="#c9866b" fill-opacity="0.12" stroke="#c9866b" stroke-opacity="0.30" stroke-width="1.5"/>
      <use data-icon="tabler-outline/check" x="826" y="362" width="16" height="16" fill="#10B981" stroke-width="2.5"/>
      <text x="834" y="406" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="600" fill="#2D2A26">Hooks</text>
      <line x1="850" y1="370" x2="890" y2="370" stroke="#c9866b" stroke-opacity="0.20" stroke-width="2"/>
      <!-- Node 3: in progress -->
      <circle cx="918" cy="370" r="18" fill="#c9866b" fill-opacity="0.10" stroke="#c9866b" stroke-opacity="0.40" stroke-width="2.5"/>
      <circle cx="918" cy="370" r="8" fill="#c9866b" fill-opacity="0.30"/>
      <text x="918" y="412" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#c9866b">状态管理</text>
      <line x1="936" y1="370" x2="976" y2="370" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="2"/>
      <!-- Node 4: pending -->
      <circle cx="1004" cy="370" r="16" fill="#F2F0ED" stroke="#2D2A26" stroke-opacity="0.12" stroke-width="1.5"/>
      <text x="1004" y="375" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.20">4</text>
      <text x="1004" y="406" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.30">路由</text>
      <!-- Arrow down -->
      <line x1="1004" y1="386" x2="1004" y2="416" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="2"/>
      <!-- Node 5: pending -->
      <circle cx="1004" cy="448" r="16" fill="#F2F0ED" stroke="#2D2A26" stroke-opacity="0.12" stroke-width="1.5"/>
      <text x="1004" y="453" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.20">5</text>
      <text x="1004" y="486" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.30">性能优化</text>
      <!-- Arrow back left -->
      <line x1="988" y1="448" x2="938" y2="448" stroke="#2D2A26" stroke-opacity="0.08" stroke-width="2"/>
      <!-- Node 6: pending -->
      <circle cx="918" cy="448" r="16" fill="#F2F0ED" stroke="#2D2A26" stroke-opacity="0.12" stroke-width="1.5"/>
      <text x="918" y="453" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.20">6</text>
      <text x="918" y="486" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#2D2A26" fill-opacity="0.30">实战项目</text>
    </g>
    <!-- Bottom feature summary -->
    <rect x="670" y="530" width="500" height="78" rx="8" fill="#c9866b" fill-opacity="0.03"/>
    <use data-icon="tabler-outline/file" x="690" y="553" width="14" height="14" fill="#c9866b" fill-opacity="0.35" stroke-width="2"/>
    <text x="712" y="556" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.28">PathNote 微型笔记链 · 每节点可添加收获/疑问</text>
    <use data-icon="tabler-outline/download" x="690" y="576" width="14" height="14" fill="#c9866b" fill-opacity="0.35" stroke-width="2"/>
    <text x="712" y="579" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.28">AI 路径分析 · 骨架生成 · 知识缺口检测 · Markdown 导出</text>
    <use data-icon="tabler-outline/chart-bar" x="690" y="599" width="14" height="14" fill="#c9866b" fill-opacity="0.35" stroke-width="2"/>
    <text x="712" y="602" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2D2A26" fill-opacity="0.28">10 个 RESTful API 端点 · dnd-kit 拖拽编排</text>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.28">18 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#2D2A26" fill-opacity="0.18">MarkBox · 学习路径</text>
  </g>
</svg>