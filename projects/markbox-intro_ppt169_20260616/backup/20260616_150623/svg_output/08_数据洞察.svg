<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#0F172A"/>

  <!-- Header -->
  <text x="640" y="70" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="18" fill="#64748B" letter-spacing="4">数 据 洞 察</text>
  <text x="640" y="112" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="36" font-weight="bold" fill="#F1F5F9">数据驱动的阅读洞察</text>
  <rect x="560" y="126" width="160" height="3" rx="1.5" fill="url(#titleGrad)"/>
  <text x="640" y="160" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="16" fill="#94A3B8">不只是收藏，更是对自己知识消费的可视化理解</text>

  <!-- 3 Column Cards -->
  <!-- Card 1: Dashboard -->
  <rect x="60" y="210" width="370" height="380" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="60" y="210" width="370" height="4" rx="2" fill="#3B82F6"/>
  <text x="245" y="260" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="26" font-weight="bold" fill="#3B82F6">📊 仪表板</text>
  <text x="245" y="295" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#F1F5F9">
    <tspan x="245" dy="0">Recharts 饼图 · 阅读状态分布</tspan>
    <tspan x="245" dy="24">柱状图 · 内容类型分析</tspan>
    <tspan x="245" dy="24">纯 CSS 词云 · 标签频率</tspan>
    <tspan x="245" dy="24">智能推荐三件套</tspan>
    <tspan x="245" dy="30">继续深入 / 拓展视野 / 重温旧宝</tspan>
  </text>
  <!-- Mini pie chart placeholder -->
  <circle cx="245" cy="470" r="50" fill="none" stroke="#334155" stroke-width="8"/>
  <circle cx="245" cy="470" r="50" fill="none" stroke="#3B82F6" stroke-width="8" stroke-dasharray="94 220" transform="rotate(-90 245 470)"/>
  <circle cx="245" cy="470" r="50" fill="none" stroke="#06B6D4" stroke-width="8" stroke-dasharray="63 251" transform="rotate(4 245 470)"/>
  <circle cx="245" cy="470" r="50" fill="none" stroke="#8B5CF6" stroke-width="8" stroke-dasharray="31 283" transform="rotate(67 245 470)"/>
  <circle cx="245" cy="470" r="50" fill="none" stroke="#10B981" stroke-width="8" stroke-dasharray="24 290" transform="rotate(98 245 470)"/>
  <text x="245" y="550" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#64748B">GET /api/stats</text>

  <!-- Card 2: Timeline -->
  <rect x="455" y="210" width="370" height="380" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="455" y="210" width="370" height="4" rx="2" fill="#06B6D4"/>
  <text x="640" y="260" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="26" font-weight="bold" fill="#06B6D4">🕐 时间线</text>
  <text x="640" y="295" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#F1F5F9">
    <tspan x="640" dy="0">按年月分组展示书签</tspan>
    <tspan x="640" dy="24">可视化收藏时间分布</tspan>
    <tspan x="640" dy="24">交错入场动画效果</tspan>
  </text>
  <!-- Timeline mock -->
  <line x1="520" y1="380" x2="760" y2="380" stroke="#334155" stroke-width="2"/>
  <circle cx="520" cy="380" r="6" fill="#06B6D4"/>
  <text x="520" y="405" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="13" fill="#94A3B8">2026-01</text>
  <rect x="500" y="415" width="40" height="16" rx="3" fill="#06B6D4" fill-opacity="0.15"/>
  <circle cx="580" cy="380" r="6" fill="#06B6D4"/>
  <text x="580" y="405" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="13" fill="#94A3B8">2026-03</text>
  <rect x="560" y="415" width="40" height="24" rx="3" fill="#06B6D4" fill-opacity="0.2"/>
  <circle cx="640" cy="380" r="6" fill="#06B6D4"/>
  <text x="640" y="405" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="13" fill="#94A3B8">2026-05</text>
  <rect x="620" y="415" width="40" height="32" rx="3" fill="#06B6D4" fill-opacity="0.25"/>
  <circle cx="700" cy="380" r="6" fill="#06B6D4"/>
  <text x="700" y="405" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="13" fill="#94A3B8">2026-06</text>
  <rect x="680" y="415" width="40" height="20" rx="3" fill="#06B6D4" fill-opacity="0.18"/>
  <text x="640" y="505" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#64748B">GET /api/stats/timeline</text>

  <!-- Card 3: Weekly Report -->
  <rect x="850" y="210" width="370" height="380" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="850" y="210" width="370" height="4" rx="2" fill="#8B5CF6"/>
  <text x="1035" y="260" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="26" font-weight="bold" fill="#8B5CF6">📅 周报</text>
  <text x="1035" y="295" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#F1F5F9">
    <tspan x="1035" dy="0">本周 vs 上周对比分析</tspan>
    <tspan x="1035" dy="24">状态分布统计</tspan>
    <tspan x="1035" dy="24">Top 标签排行</tspan>
    <tspan x="1035" dy="24">增长趋势可视化</tspan>
  </text>
  <!-- Week comparison mock -->
  <rect x="900" y="420" width="80" height="80" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="940" y="445" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#64748B">本周</text>
  <text x="940" y="475" text-anchor="middle" font-family="Consolas, monospace" font-size="26" font-weight="bold" fill="#10B981">23</text>
  <text x="940" y="493" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="10" fill="#10B981">↑ 5</text>
  <rect x="1010" y="420" width="80" height="80" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="1050" y="445" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#64748B">上周</text>
  <text x="1050" y="475" text-anchor="middle" font-family="Consolas, monospace" font-size="26" font-weight="bold" fill="#94A3B8">18</text>

  <text x="1035" y="550" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#64748B">GET /api/stats/weekly</text>

  <text x="1220" y="690" text-anchor="end" font-family="Consolas, monospace" font-size="12" fill="#64748B">08 / 14</text>
</svg>