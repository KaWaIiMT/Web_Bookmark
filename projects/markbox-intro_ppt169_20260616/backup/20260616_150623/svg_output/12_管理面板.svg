<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#0F172A"/>

  <!-- Header -->
  <text x="640" y="70" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="18" fill="#64748B" letter-spacing="4">后 台 管 理</text>
  <text x="640" y="112" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="36" font-weight="bold" fill="#F1F5F9">管理面板</text>
  <rect x="560" y="126" width="160" height="3" rx="1.5" fill="url(#titleGrad)"/>
  <text x="640" y="160" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="16" fill="#94A3B8">多用户管理、书签审查 — 为团队和实例管理员提供完整控制</text>

  <!-- Card 1: User Management -->
  <rect x="80" y="210" width="540" height="380" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="210" width="540" height="4" rx="2" fill="#3B82F6"/>
  <text x="350" y="265" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="26" font-weight="bold" fill="#3B82F6">👥 用户管理</text>

  <!-- User table mock -->
  <rect x="120" y="295" width="460" height="36" rx="4" fill="#0F172A"/>
  <text x="150" y="319" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#94A3B8">用户</text>
  <text x="320" y="319" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#94A3B8">邮箱</text>
  <text x="500" y="319" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#94A3B8">角色</text>

  <rect x="120" y="335" width="460" height="30" rx="3" fill="#1E293B"/>
  <text x="150" y="355" font-family="'Noto Sans SC', Arial, sans-serif" font-size="13" fill="#F1F5F9">user_01</text>
  <text x="320" y="355" font-family="Consolas, monospace" font-size="12" fill="#94A3B8">dev@example.com</text>
  <text x="500" y="355" font-family="Consolas, monospace" font-size="12" fill="#3B82F6">admin</text>

  <rect x="120" y="369" width="460" height="30" rx="3" fill="#1E293B"/>
  <text x="150" y="389" font-family="'Noto Sans SC', Arial, sans-serif" font-size="13" fill="#F1F5F9">user_02</text>
  <text x="320" y="389" font-family="Consolas, monospace" font-size="12" fill="#94A3B8">pm@example.com</text>
  <text x="500" y="389" font-family="Consolas, monospace" font-size="12" fill="#64748B">user</text>

  <rect x="120" y="403" width="460" height="30" rx="3" fill="#1E293B"/>
  <text x="150" y="423" font-family="'Noto Sans SC', Arial, sans-serif" font-size="13" fill="#F1F5F9">user_03</text>
  <text x="320" y="423" font-family="Consolas, monospace" font-size="12" fill="#94A3B8">designer@example.com</text>
  <text x="500" y="423" font-family="Consolas, monospace" font-size="12" fill="#64748B">user</text>

  <text x="350" y="480" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#94A3B8">
    <tspan x="350" dy="0">用户列表 + 角色分配 + 书签查看</tspan>
  </text>
  <text x="350" y="520" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#64748B">GET /api/admin/users</text>
  <text x="350" y="545" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#64748B">GET /api/admin/users/[id]/bookmarks</text>

  <!-- Card 2: Data Management -->
  <rect x="660" y="210" width="540" height="380" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="660" y="210" width="540" height="4" rx="2" fill="#06B6D4"/>
  <text x="930" y="265" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="26" font-weight="bold" fill="#06B6D4">📋 数据管理</text>

  <!-- Stats cards -->
  <rect x="710" y="295" width="140" height="70" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="780" y="325" text-anchor="middle" font-family="Consolas, monospace" font-size="28" font-weight="bold" fill="#3B82F6">1,247</text>
  <text x="780" y="350" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="12" fill="#94A3B8">总计书签</text>

  <rect x="870" y="295" width="140" height="70" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="940" y="325" text-anchor="middle" font-family="Consolas, monospace" font-size="28" font-weight="bold" fill="#10B981">892</text>
  <text x="940" y="350" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="12" fill="#94A3B8">已读</text>

  <rect x="1030" y="295" width="140" height="70" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="1100" y="325" text-anchor="middle" font-family="Consolas, monospace" font-size="28" font-weight="bold" fill="#F59E0B">203</text>
  <text x="1100" y="350" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="12" fill="#94A3B8">待读</text>

  <rect x="710" y="385" width="140" height="70" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="780" y="415" text-anchor="middle" font-family="Consolas, monospace" font-size="28" font-weight="bold" fill="#8B5CF6">89</text>
  <text x="780" y="440" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="12" fill="#94A3B8">收藏夹</text>

  <rect x="870" y="385" width="140" height="70" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="940" y="415" text-anchor="middle" font-family="Consolas, monospace" font-size="28" font-weight="bold" fill="#06B6D4">347</text>
  <text x="940" y="440" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="12" fill="#94A3B8">标签种类</text>

  <rect x="1030" y="385" width="140" height="70" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="1100" y="415" text-anchor="middle" font-family="Consolas, monospace" font-size="28" font-weight="bold" fill="#10B981">56</text>
  <text x="1100" y="440" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="12" fill="#94A3B8">用户数</text>

  <text x="930" y="505" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#94A3B8">
    <tspan x="930" dy="0">书签导出 JSON · 统计概览</tspan>
    <tspan x="930" dy="24">含 URL / 标题 / 描述 / 标签 / 状态 / AI 摘要</tspan>
  </text>

  <text x="1220" y="690" text-anchor="end" font-family="Consolas, monospace" font-size="12" fill="#64748B">12 / 14</text>
</svg>