<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="icon1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="icon2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="icon3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#0F172A"/>

  <!-- Header -->
  <text x="640" y="80" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="18" fill="#64748B" letter-spacing="4">AI 引 擎</text>
  <text x="640" y="130" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="36" font-weight="bold" fill="#F1F5F9">AI 驱动的智能理解</text>
  <rect x="560" y="148" width="160" height="3" rx="1.5" fill="url(#titleGrad)"/>
  <text x="640" y="185" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="17" fill="#94A3B8">让每个书签从「一个链接」变成「一份结构化知识」</text>

  <!-- 3 Feature Cards -->
  <!-- Card 1: Auto Tag -->
  <rect x="100" y="240" width="340" height="340" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <!-- Icon: tag -->
  <g transform="translate(270, 300)">
    <path d="M-28,-20 L28,-20 L30,0 L0,30 L-28,30 L-30,0 Z" fill="none" stroke="url(#icon1)" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="-10" cy="0" r="5" fill="#3B82F6"/>
  </g>
  <text x="270" y="370" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="24" font-weight="bold" fill="#F1F5F9">自动标签</text>
  <text x="270" y="405" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="16" fill="#94A3B8">
    <tspan x="270" dy="0">AI 自动生成 2-5 个</tspan>
    <tspan x="270" dy="26">精准中文标签</tspan>
  </text>
  <text x="270" y="465" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#64748B">
    <tspan x="270" dy="0">例：「React」→</tspan>
    <tspan x="270" dy="24">前端框架 · 状态管理 · Hooks</tspan>
  </text>
  <!-- Mini badge -->
  <rect x="190" y="500" width="160" height="26" rx="13" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="270" y="518" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#3B82F6">DeepSeek V4 Flash</text>

  <!-- Card 2: Auto Category -->
  <rect x="470" y="240" width="340" height="340" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <!-- Icon: folder/classification -->
  <g transform="translate(640, 300)">
    <rect x="-30" y="-22" width="60" height="44" rx="4" fill="none" stroke="url(#icon2)" stroke-width="2.5"/>
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#06B6D4" stroke-width="2"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#06B6D4" stroke-width="2"/>
    <line x1="-20" y1="10" x2="10" y2="10" stroke="#06B6D4" stroke-width="2"/>
  </g>
  <text x="640" y="370" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="24" font-weight="bold" fill="#F1F5F9">智能分类</text>
  <text x="640" y="405" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="16" fill="#94A3B8">
    <tspan x="640" dy="0">自动建议层级分类路径</tspan>
    <tspan x="640" dy="26">支持多级嵌套结构</tspan>
  </text>
  <text x="640" y="465" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#64748B">
    <tspan x="640" dy="0">例：前端 > React ></tspan>
    <tspan x="640" dy="24">状态管理 > Zustand</tspan>
  </text>
  <rect x="560" y="500" width="160" height="26" rx="13" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="640" y="518" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#06B6D4">层级自动推断</text>

  <!-- Card 3: AI Summary -->
  <rect x="840" y="240" width="340" height="340" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <!-- Icon: brain/AI -->
  <g transform="translate(1010, 300)">
    <path d="M-25,-15 Q-25,-30 0,-30 Q25,-30 25,-15 L25,5 Q25,15 15,15 L-15,15 Q-25,15 -25,5 Z" fill="none" stroke="url(#icon3)" stroke-width="2.5"/>
    <line x1="-12" y1="-5" x2="12" y2="-5" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="-12" y1="4" x2="12" y2="4" stroke="#8B5CF6" stroke-width="1.5"/>
    <circle cx="0" cy="-18" r="8" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
  </g>
  <text x="1010" y="370" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="24" font-weight="bold" fill="#F1F5F9">AI 摘要</text>
  <text x="1010" y="405" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="16" fill="#94A3B8">
    <tspan x="1010" dy="0">自动生成 2-3 句</tspan>
    <tspan x="1010" dy="26">中文摘要快速回顾</tspan>
  </text>
  <text x="1010" y="465" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#64748B">
    <tspan x="1010" dy="0">支持编辑模式</tspan>
    <tspan x="1010" dy="24">可修改已有的书签</tspan>
  </text>
  <rect x="930" y="500" width="160" height="26" rx="13" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="1010" y="518" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#8B5CF6">批量处理支持</text>

  <text x="1220" y="690" text-anchor="end" font-family="Consolas, monospace" font-size="12" fill="#64748B">05 / 14</text>
</svg>