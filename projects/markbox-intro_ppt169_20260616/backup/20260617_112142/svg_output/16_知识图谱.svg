<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#25221f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#25221f"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#e8e4df" fill-opacity="0.3">视图</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#e8e4df">知识图谱</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#e8e4df" fill-opacity="0.50">力导向图 · 标签共现网络 · 三层交互 · 时间轴播放</text>
  </g>
  <!-- Main placeholder: full graph -->
  <g id="placeholder-graph">
    <rect x="80" y="185" width="725" height="330" rx="12" fill="#c9866b" fill-opacity="0.03"/>
    <rect x="80" y="185" width="725" height="330" rx="12" fill="none" stroke="#c9866b" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="8,4"/>
    <use data-icon="tabler-outline/graph" x="405" y="315" width="44" height="44" fill="#c9866b" fill-opacity="0.38" stroke-width="2"/>
    <text x="442" y="350" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#e8e4df" fill-opacity="0.33">full_knowledge_graph.png</text>
    <text x="442" y="373" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.15">力导向图全貌</text>
  </g>
  <!-- Callout features on right side -->
  <g id="callouts">
    <g id="callout-1">
      <rect x="835" y="185" width="365" height="100" rx="10" fill="#33302d"/>
      <use data-icon="tabler-outline/search" x="860" y="210" width="20" height="20" fill="#c9866b" stroke-width="2"/>
      <text x="895" y="225" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#e8e4df">搜索高亮 + 节点筛选</text>
      <text x="860" y="252" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#e8e4df" fill-opacity="0.3">搜索节点高亮标记 · 下拉筛选仅显示邻居</text>
    </g>
    <g id="callout-2">
      <rect x="835" y="300" width="365" height="100" rx="10" fill="#33302d"/>
      <use data-icon="tabler-outline/arrow-right" x="860" y="325" width="20" height="20" fill="#c9866b" stroke-width="2"/>
      <text x="895" y="340" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#e8e4df">三层交互</text>
      <text x="860" y="367" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#e8e4df" fill-opacity="0.3">L1 标签/分类总览 → L2 点击展开书签 → L3 详情抽屉</text>
    </g>
    <g id="callout-3">
      <rect x="835" y="415" width="365" height="100" rx="10" fill="#33302d"/>
      <use data-icon="tabler-outline/star" x="860" y="440" width="20" height="20" fill="#c9866b" stroke-width="2"/>
      <text x="895" y="455" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#e8e4df">视觉打磨</text>
      <text x="860" y="482" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#e8e4df" fill-opacity="0.3">径向渐变光晕 · 暗色星空背景 · 节点大小按连接数</text>
    </g>
  </g>
  <!-- Bottom: detail placeholders -->
  <g id="placeholder-node">
    <rect x="80" y="540" width="350" height="100" rx="10" fill="#c9866b" fill-opacity="0.03"/>
    <rect x="80" y="540" width="350" height="100" rx="10" fill="none" stroke="#c9866b" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="8,4"/>
    <use data-icon="tabler-outline/eye" x="220" y="565" width="24" height="24" fill="#c9866b" fill-opacity="0.38" stroke-width="2"/>
    <text x="255" y="585" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.33">detail_graph_node.png</text>
    <text x="255" y="608" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#e8e4df" fill-opacity="0.15">节点展开 · 书签子节点</text>
  </g>
  <g id="placeholder-timeline">
    <rect x="455" y="540" width="350" height="100" rx="10" fill="#c9866b" fill-opacity="0.03"/>
    <rect x="455" y="540" width="350" height="100" rx="10" fill="none" stroke="#c9866b" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="8,4"/>
    <use data-icon="tabler-outline/player-play" x="595" y="565" width="24" height="24" fill="#c9866b" fill-opacity="0.38" stroke-width="2"/>
    <text x="630" y="585" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.33">detail_graph_timeline.png</text>
    <text x="630" y="608" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#e8e4df" fill-opacity="0.15">时间轴播放控件</text>
  </g>
  <!-- Feature note -->
  <g id="note">
    <rect x="830" y="540" width="370" height="100" rx="8" fill="#c9866b" fill-opacity="0.04"/>
    <text x="855" y="568" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9866b" fill-opacity="0.5">技术亮点</text>
    <text x="855" y="595" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#e8e4df" fill-opacity="0.3">防闪烁架构：全量节点预加载+visibility 控制</text>
    <text x="855" y="618" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#e8e4df" fill-opacity="0.3">时间轴滑块+1x/2x/5x 播放速度+截图导出 PNG</text>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.33">16 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.15">MarkBox · 知识图谱</text>
  </g>
</svg>
