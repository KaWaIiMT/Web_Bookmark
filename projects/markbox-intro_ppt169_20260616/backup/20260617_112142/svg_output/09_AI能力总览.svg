<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#25221f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#25221f"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#e8e4df" fill-opacity="0.3">AI</text>
    <line x1="80" y1="68" x2="120" y2="68" stroke="#c9866b" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="640" y="140" text-anchor="middle" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="40" font-weight="700" fill="#e8e4df">AI 能力总览</text>
    <text x="640" y="180" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#e8e4df" fill-opacity="0.4">DeepSeek V4 Flash 驱动，让每个书签从「一个链接」变成「一份结构化知识」</text>
  </g>
  <!-- Three AI capability cards -->
  <g id="card-tag">
    <rect x="80" y="240" width="360" height="380" rx="16" fill="#33302d"/>
    <rect x="80" y="240" width="360" height="380" rx="16" fill="none" stroke="#e8e4df" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="260" cy="310" r="40" fill="#c9866b" fill-opacity="0.1"/>
    <use data-icon="tabler-outline/tag" x="240" y="290" width="40" height="40" fill="#c9866b" stroke-width="2"/>
    <text x="260" y="390" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#e8e4df">自动标签</text>
    <text x="260" y="430" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="400" fill="#e8e4df" fill-opacity="0.45">AI 生成 2-5 个</text>
    <text x="260" y="458" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="400" fill="#e8e4df" fill-opacity="0.45">精准中文标签</text>
    <line x1="180" y1="490" x2="340" y2="490" stroke="#e8e4df" stroke-opacity="0.12" stroke-width="1"/>
    <text x="260" y="525" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.3">彩色标签徽章展示</text>
    <text x="260" y="550" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.3">标签云词频可视化</text>
  </g>
  <g id="card-category">
    <rect x="460" y="240" width="360" height="380" rx="16" fill="#33302d"/>
    <rect x="460" y="240" width="360" height="380" rx="16" fill="none" stroke="#e8e4df" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="640" cy="310" r="40" fill="#c9866b" fill-opacity="0.1"/>
    <use data-icon="tabler-outline/folder" x="620" y="290" width="40" height="40" fill="#c9866b" stroke-width="2"/>
    <text x="640" y="390" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#e8e4df">智能分类</text>
    <text x="640" y="430" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="400" fill="#e8e4df" fill-opacity="0.45">自动建议</text>
    <text x="640" y="458" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="400" fill="#e8e4df" fill-opacity="0.45">层级分类路径</text>
    <line x1="560" y1="490" x2="720" y2="490" stroke="#e8e4df" stroke-opacity="0.12" stroke-width="1"/>
    <text x="640" y="525" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.3">如：技术学习 &gt; 前端 &gt; React</text>
    <text x="640" y="550" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.3">用户可修改 · 分类树侧边栏</text>
  </g>
  <g id="card-summary">
    <rect x="840" y="240" width="360" height="380" rx="16" fill="#33302d"/>
    <rect x="840" y="240" width="360" height="380" rx="16" fill="none" stroke="#e8e4df" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="1020" cy="310" r="40" fill="#c9866b" fill-opacity="0.1"/>
    <use data-icon="tabler-outline/file" x="1000" y="290" width="40" height="40" fill="#c9866b" stroke-width="2"/>
    <text x="1020" y="390" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#e8e4df">AI 摘要</text>
    <text x="1020" y="430" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="400" fill="#e8e4df" fill-opacity="0.45">2-3 句中文摘要</text>
    <text x="1020" y="458" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="400" fill="#e8e4df" fill-opacity="0.45">1-3 秒自动生成</text>
    <line x1="940" y1="490" x2="1100" y2="490" stroke="#e8e4df" stroke-opacity="0.12" stroke-width="1"/>
    <text x="1020" y="525" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.3">展开/收起状态</text>
    <text x="1020" y="550" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.3">快速回顾书签内容</text>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.33">09 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.15">MarkBox · AI 能力总览</text>
  </g>
</svg>
