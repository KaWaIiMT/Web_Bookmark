<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#25221f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#25221f"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#e8e4df" fill-opacity="0.3">AI</text>
    <line x1="80" y1="68" x2="120" y2="68" stroke="#c9866b" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#e8e4df">自动标签</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#e8e4df" fill-opacity="0.50">AI 生成 2-5 个精准中文标签，彩色徽章展示</text>
  </g>
  <g id="left-content">
    <g id="feature-1">
      <use data-icon="tabler-outline/sparkles" x="80" y="210" width="24" height="24" fill="#c9866b" stroke-width="2"/>
      <text x="120" y="228" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#e8e4df">智能标签生成</text>
      <text x="120" y="255" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.50">DeepSeek V4 Flash 分析书签内容，自动生成 2-5 个精准中文标签</text>
    </g>
    <g id="feature-2">
      <use data-icon="tabler-outline/puzzle" x="80" y="310" width="24" height="24" fill="#c9866b" stroke-width="2"/>
      <text x="120" y="328" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#e8e4df">用户可编辑</text>
      <text x="120" y="355" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.50">标签非锁定，用户可手动增删改，标签属于用户私有</text>
    </g>
    <g id="feature-3">
      <use data-icon="tabler-outline/chart-pie" x="80" y="410" width="24" height="24" fill="#c9866b" stroke-width="2"/>
      <text x="120" y="428" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#e8e4df">标签词云可视化</text>
      <text x="120" y="455" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.50">纯 CSS flex-wrap + 动态字号实现，不带 d3-cloud 依赖，Dashboard 标签分布一目了然</text>
    </g>
    <g id="feature-4">
      <use data-icon="tabler-outline/git-compare" x="80" y="510" width="24" height="24" fill="#c9866b" stroke-width="2"/>
      <text x="120" y="528" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#e8e4df">标签共现推荐</text>
      <text x="120" y="555" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#e8e4df" fill-opacity="0.50">Jaccard 标签相似度算法，免 AI 毫秒级关联推荐</text>
    </g>
  </g>
  <g id="placeholder-tags">
    <rect x="640" y="190" width="560" height="440" rx="12" fill="#c9866b" fill-opacity="0.03"/>
    <rect x="640" y="190" width="560" height="440" rx="12" fill="none" stroke="#c9866b" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="8,4"/>
    <use data-icon="tabler-outline/tag" x="880" y="375" width="40" height="40" fill="#c9866b" fill-opacity="0.38" stroke-width="2"/>
    <text x="920" y="400" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#e8e4df" fill-opacity="0.33">detail_tags.png</text>
    <text x="920" y="423" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.15">AI 标签徽章特写</text>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.33">10 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.15">MarkBox · 自动标签</text>
  </g>
</svg>
