<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="60%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#25221f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#25221f"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="header">
    <text x="80" y="55" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#e8e4df" fill-opacity="0.3">视图</text>
    <line x1="80" y1="68" x2="130" y2="68" stroke="#c9866b" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="80" y="120" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="700" fill="#e8e4df">时间线 &amp; 周报</text>
    <text x="80" y="153" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#e8e4df" fill-opacity="0.50">时间维度洞察 — 浏览书签收藏历史 &amp; 本周阅读变化</text>
  </g>
  <!-- Left column: Timeline -->
  <g id="col-timeline">
    <text x="80" y="205" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#e8e4df">时间线视图</text>
    <rect x="80" y="225" width="545" height="340" rx="12" fill="#c9866b" fill-opacity="0.03"/>
    <rect x="80" y="225" width="545" height="340" rx="12" fill="none" stroke="#c9866b" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="8,4"/>
    <use data-icon="tabler-outline/timeline" x="320" y="360" width="40" height="40" fill="#c9866b" fill-opacity="0.38" stroke-width="2"/>
    <text x="352" y="390" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#e8e4df" fill-opacity="0.33">full_timeline.png</text>
    <text x="352" y="412" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.15">按月分组垂直时间线</text>
    <text x="80" y="600" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.38">按月分组垂直时间线 · motion 交错入场动画 · RESTful 后端数据按月统计</text>
  </g>
  <!-- Right column: Weekly -->
  <g id="col-weekly">
    <text x="655" y="205" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#e8e4df">周报</text>
    <rect x="655" y="225" width="545" height="340" rx="12" fill="#c9866b" fill-opacity="0.03"/>
    <rect x="655" y="225" width="545" height="340" rx="12" fill="none" stroke="#c9866b" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="8,4"/>
    <use data-icon="tabler-outline/chart-bar" x="895" y="360" width="40" height="40" fill="#c9866b" fill-opacity="0.38" stroke-width="2"/>
    <text x="927" y="390" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#e8e4df" fill-opacity="0.33">detail_weekly.png</text>
    <text x="927" y="412" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.15">周报对比数字卡片</text>
    <text x="655" y="600" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.38">本周 vs 上周对比 · 状态分布 · Top 标签 · 增长趋势 · 每周自动汇总</text>
  </g>
  <g id="footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.33">15 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.15">MarkBox · 时间线 &amp; 周报</text>
  </g>
</svg>
