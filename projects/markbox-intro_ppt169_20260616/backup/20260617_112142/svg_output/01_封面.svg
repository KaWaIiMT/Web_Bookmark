<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="75%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0.09"/>
      <stop offset="50%" stop-color="#b76e4b" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#25221f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8e4df"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
    <linearGradient id="underlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9866b" stop-opacity="0"/>
      <stop offset="40%" stop-color="#c9866b"/>
      <stop offset="60%" stop-color="#c9866b"/>
      <stop offset="100%" stop-color="#c9866b" stop-opacity="0"/>
    </linearGradient>
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#c9866b" flood-opacity="0.25" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g id="bg-layer">
    <rect x="0" y="0" width="1280" height="720" fill="#25221f"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>
  </g>
  <g id="decor-top">
    <circle cx="1100" cy="120" r="180" fill="#c9866b" fill-opacity="0.03"/>
    <circle cx="1100" cy="120" r="120" fill="none" stroke="#c9866b" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="1100" cy="120" r="60" fill="none" stroke="#c9866b" stroke-opacity="0.04" stroke-width="0.5"/>
  </g>
  <g id="decor-bottom">
    <line x1="80" y1="650" x2="280" y2="650" stroke="#c9866b" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="80" y1="660" x2="200" y2="660" stroke="#c9866b" stroke-opacity="0.08" stroke-width="0.5"/>
  </g>
  <g id="cover-title">
    <text x="640" y="300" text-anchor="middle" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="72" font-weight="700" fill="url(#titleGrad)" filter="url(#titleGlow)">MarkBox</text>
    <rect x="440" y="325" width="400" height="2" rx="1" fill="url(#underlineGrad)"/>
  </g>
  <g id="cover-subtitle">
    <text x="640" y="390" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="400" fill="#e8e4df" fill-opacity="0.6">AI 智能书签管理器</text>
  </g>
  <g id="cover-tagline">
    <text x="640" y="540" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#e8e4df" fill-opacity="0.3">粘贴链接 · AI 理解 · 知识沉淀</text>
  </g>
  <g id="cover-icons">
    <use data-icon="tabler-outline/bookmark" x="616" y="565" width="18" height="18" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
    <use data-icon="tabler-outline/sparkles" x="646" y="565" width="18" height="18" fill="#c9866b" fill-opacity="0.50" stroke-width="2"/>
  </g>
  <g id="cover-footer">
    <text x="1200" y="690" text-anchor="end" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.33">01 / 25</text>
    <text x="80" y="690" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#e8e4df" fill-opacity="0.15">MarkBox · 项目路演</text>
  </g>
</svg>
