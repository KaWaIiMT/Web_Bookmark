<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3B82F6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#0F172A"/>
  <rect x="0" y="0" width="1280" height="720" fill="url(#centerGlow)"/>

  <!-- Hero statement -->
  <text x="640" y="120" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="18" fill="#64748B" letter-spacing="4">解 决 方 案</text>

  <text x="640" y="210" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="44" font-weight="bold" fill="#F1F5F9">
    <tspan x="640" dy="0">一个链接进来</tspan>
    <tspan x="640" dy="54">AI 自动提取、理解、分类、关联</tspan>
  </text>

  <rect x="540" y="240" width="200" height="4" rx="2" fill="url(#heroGrad)"/>

  <text x="640" y="300" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="20" fill="#94A3B8">你只管收藏，剩下的交给 AI</text>

  <!-- 3-step flow -->
  <!-- Step 1 -->
  <rect x="160" y="400" width="260" height="160" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="290" cy="440" r="28" fill="none" stroke="#3B82F6" stroke-width="2"/>
  <text x="290" y="446" text-anchor="middle" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#3B82F6">1</text>
  <text x="290" y="500" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="22" font-weight="bold" fill="#F1F5F9">📎 收藏</text>
  <text x="290" y="530" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#94A3B8">
    <tspan x="290" dy="0">粘贴链接或一键扩展收藏</tspan>
  </text>

  <!-- Arrow 1->2 -->
  <line x1="430" y1="480" x2="490" y2="480" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="510" y="400" width="260" height="160" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="640" cy="440" r="28" fill="none" stroke="#06B6D4" stroke-width="2"/>
  <text x="640" y="446" text-anchor="middle" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#06B6D4">2</text>
  <text x="640" y="500" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="22" font-weight="bold" fill="#F1F5F9">🧠 AI 理解</text>
  <text x="640" y="530" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#94A3B8">
    <tspan x="640" dy="0">自动摘要、标签、分类</tspan>
  </text>

  <!-- Arrow 2->3 -->
  <line x1="780" y1="480" x2="840" y2="480" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="860" y="400" width="260" height="160" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="990" cy="440" r="28" fill="none" stroke="#8B5CF6" stroke-width="2"/>
  <text x="990" y="446" text-anchor="middle" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#8B5CF6">3</text>
  <text x="990" y="500" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="22" font-weight="bold" fill="#F1F5F9">📊 知识网络</text>
  <text x="990" y="530" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#94A3B8">
    <tspan x="990" dy="0">自动生长关联与洞察</tspan>
  </text>

  <text x="640" y="630" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="17" fill="#64748B">三步闭环：收藏 → 理解 → 发现</text>

  <text x="1220" y="690" text-anchor="end" font-family="Consolas, monospace" font-size="12" fill="#64748B">03 / 14</text>
</svg>