<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#0F172A"/>
  <rect x="0" y="0" width="1280" height="720" fill="url(#bgGlow)"/>

  <!-- Main content -->
  <text x="640" y="215" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="48" font-weight="bold" fill="#F1F5F9" letter-spacing="2">开始使用 MarkBox</text>

  <rect x="540" y="240" width="200" height="4" rx="2" fill="url(#accentBar)"/>

  <text x="640" y="310" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="20" fill="#94A3B8">开源免费，一行命令启动，让书签成为你的第二大脑</text>

  <!-- Command box -->
  <rect x="180" y="360" width="920" height="170" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="180" y="360" width="920" height="4" rx="2" fill="url(#accentBar)"/>

  <text x="220" y="405" font-family="Consolas, monospace" font-size="17" fill="#10B981">
    <tspan x="220" dy="0">$ git clone https://github.com/KaWaIiMT/Web_Bookmark.git</tspan>
    <tspan x="220" dy="32">$ cd Web_Bookmark</tspan>
    <tspan x="220" dy="32">$ npm install &amp;&amp; npx prisma db push &amp;&amp; npm run dev</tspan>
  </text>

  <text x="220" y="505" font-family="'Noto Sans SC', Arial, sans-serif" font-size="15" fill="#64748B">配置 .env.local 中的 GitHub OAuth + DeepSeek API Key 即可使用</text>

  <!-- CTA -->
  <rect x="460" y="565" width="160" height="44" rx="22" fill="#3B82F6"/>
  <text x="540" y="594" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#F1F5F9">⭐ Star</text>

  <rect x="660" y="565" width="160" height="44" rx="22" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="740" y="594" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#94A3B8">🚀 Contribute</text>

  <!-- Bottom -->
  <text x="640" y="655" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" fill="#64748B">Next.js 16 · React 19 · Prisma 7 · DeepSeek V4 · Tailwind CSS 4</text>

  <text x="1220" y="690" text-anchor="end" font-family="Consolas, monospace" font-size="12" fill="#64748B">14 / 14</text>
</svg>