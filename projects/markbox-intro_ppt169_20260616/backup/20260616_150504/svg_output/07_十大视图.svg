<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#0F172A"/>

  <!-- Header -->
  <text x="640" y="70" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="18" fill="#64748B" letter-spacing="4">视 图 体 系</text>
  <text x="640" y="112" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="36" font-weight="bold" fill="#F1F5F9">十大功能视图</text>
  <rect x="560" y="126" width="160" height="3" rx="1.5" fill="url(#titleGrad)"/>
  <text x="640" y="158" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="16" fill="#94A3B8">同一个书签库，十种视角 — 每种视角解决一种需求</text>

  <!-- 3x3 Grid + 1 centered -->
  <!-- Row 1 -->
  <rect x="80" y="195" width="360" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="195" width="4" height="80" rx="2" fill="#3B82F6"/>
  <text x="110" y="228" font-family="'Noto Sans SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#F1F5F9">📋 网格视图</text>
  <text x="110" y="254" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" fill="#94A3B8">响应式卡片网格 + 右键菜单</text>

  <rect x="460" y="195" width="360" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="460" y="195" width="4" height="80" rx="2" fill="#06B6D4"/>
  <text x="490" y="228" font-family="'Noto Sans SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#F1F5F9">🖼️ 画廊视图</text>
  <text x="490" y="254" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" fill="#94A3B8">CSS Columns 瀑布流 + 悬停详情</text>

  <rect x="840" y="195" width="360" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="840" y="195" width="4" height="80" rx="2" fill="#8B5CF6"/>
  <text x="870" y="228" font-family="'Noto Sans SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#F1F5F9">🔍 发现视图</text>
  <text x="870" y="254" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" fill="#94A3B8">跨领域发现 + 每日精选</text>

  <!-- Row 2 -->
  <rect x="80" y="295" width="360" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="295" width="4" height="80" rx="2" fill="#06B6D4"/>
  <text x="110" y="328" font-family="'Noto Sans SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#F1F5F9">⚖️ 对比视图</text>
  <text x="110" y="354" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" fill="#94A3B8">AI 多维对比 + 雷达图 + 矩阵</text>

  <rect x="460" y="295" width="360" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="460" y="295" width="4" height="80" rx="2" fill="#10B981"/>
  <text x="490" y="328" font-family="'Noto Sans SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#F1F5F9">📚 学习路径</text>
  <text x="490" y="354" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" fill="#94A3B8">结构化学习计划 + 进度追踪</text>

  <rect x="840" y="295" width="360" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="840" y="295" width="4" height="80" rx="2" fill="#F59E0B"/>
  <text x="870" y="328" font-family="'Noto Sans SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#F1F5F9">🔥 热度追踪</text>
  <text x="870" y="354" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" fill="#94A3B8">GitHub Star/Fork 趋势 Sparkline</text>

  <!-- Row 3 -->
  <rect x="80" y="395" width="360" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="395" width="4" height="80" rx="2" fill="#8B5CF6"/>
  <text x="110" y="428" font-family="'Noto Sans SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#F1F5F9">📊 仪表板</text>
  <text x="110" y="454" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" fill="#94A3B8">饼图+柱状图+词云+智能推荐</text>

  <rect x="460" y="395" width="360" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="460" y="395" width="4" height="80" rx="2" fill="#06B6D4"/>
  <text x="490" y="428" font-family="'Noto Sans SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#F1F5F9">🕐 时间线</text>
  <text x="490" y="454" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" fill="#94A3B8">按年月分组 + 交错入场动画</text>

  <rect x="840" y="395" width="360" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="840" y="395" width="4" height="80" rx="2" fill="#10B981"/>
  <text x="870" y="428" font-family="'Noto Sans SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#F1F5F9">📅 周报</text>
  <text x="870" y="454" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" fill="#94A3B8">本周 vs 上周对比 + 趋势分析</text>

  <!-- Bottom centered: 知识图谱 -->
  <rect x="360" y="510" width="560" height="80" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="360" y="510" width="560" height="4" rx="2" fill="url(#titleGrad)"/>
  <text x="640" y="545" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="22" font-weight="bold" fill="#F1F5F9">🧬 知识图谱 — react-force-graph-2d 力导向图 · 节点搜索 · Canvas 截图导出</text>
  <text x="640" y="572" text-anchor="middle" font-family="'Noto Sans SC', Arial, sans-serif" font-size="14" fill="#94A3B8">暗色/亮色主题适配 · 时间轴动画 · 暂停/恢复模拟</text>

  <text x="1220" y="690" text-anchor="end" font-family="Consolas, monospace" font-size="12" fill="#64748B">07 / 14</text>
</svg>